name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Release CLI
    if: github.repository == 'stewartpark/private-llm'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
          cache-dependency-path: cli/go.sum

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean --parallelism 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  mac-app:
    name: Release Mac App
    if: github.repository == 'stewartpark/private-llm'
    runs-on: macos-latest
    timeout-minutes: 30
    needs: release
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
          cache-dependency-path: cli/go.sum

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Import signing certificate
        env:
          P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_P12 }}
          P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
        run: |
          set +x
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          echo "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12" 2>/dev/null

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$RUNNER_TEMP/cert.p12" \
            -P "$P12_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Download Sparkle Framework
        run: |
          curl -sL https://github.com/sparkle-project/Sparkle/releases/download/2.9.0/Sparkle-for-Swift-Package-Manager.zip -o /tmp/sparkle-spm.zip
          unzip -q /tmp/sparkle-spm.zip -d /tmp/sparkle_extracted
          ditto /tmp/sparkle_extracted/Sparkle.xcframework/macos-arm64_x86_64/Sparkle.framework "app/Resources/Sparkle.framework"

      - name: Download Pulumi CLI
        run: |
          mkdir -p bin
          ARCH=$(uname -m)
          if [ "$ARCH" = "arm64" ]; then ARCH="arm64"; else ARCH="x64"; fi
          curl -sL "https://get.pulumi.com/releases/sdk/pulumi-v${{ env.PULUMI_VERSION }}-darwin-${ARCH}.tar.gz" -o /tmp/pulumi.tar.gz
          tar -xzf /tmp/pulumi.tar.gz -C /tmp pulumi/pulumi
          mv /tmp/pulumi/pulumi bin/pulumi
          rm -rf /tmp/pulumi /tmp/pulumi.tar.gz
        env:
          PULUMI_VERSION: '3.161.0'

      - name: Build
        run: |
          (cd cli && go build -o ../bin/private-llm .)
          (cd app && swift build -c release)
          rm -rf "bin/Private LLM.app"
          mkdir -p "bin/Private LLM.app/Contents/MacOS"
          mkdir -p "bin/Private LLM.app/Contents/Resources"
          mkdir -p "bin/Private LLM.app/Contents/Frameworks"
          cp app/.build/release/PrivateLLM "bin/Private LLM.app/Contents/MacOS/PrivateLLM"
          install_name_tool -delete_rpath @loader_path "bin/Private LLM.app/Contents/MacOS/PrivateLLM" 2>/dev/null || true
          install_name_tool -add_rpath @executable_path/../Frameworks "bin/Private LLM.app/Contents/MacOS/PrivateLLM"
          cp app/Resources/Info.plist "bin/Private LLM.app/Contents/Info.plist"
          cp bin/private-llm "bin/Private LLM.app/Contents/Resources/private-llm"
          cp bin/pulumi "bin/Private LLM.app/Contents/Resources/pulumi"
          cp app/Resources/AppIcon.icns "bin/Private LLM.app/Contents/Resources/AppIcon.icns"
          cp app/Resources/MenuBarIcon.png "bin/Private LLM.app/Contents/Resources/MenuBarIcon.png"
          cp app/Resources/MenuBarIcon@2x.png "bin/Private LLM.app/Contents/Resources/MenuBarIcon@2x.png"
          ditto app/Resources/Sparkle.framework "bin/Private LLM.app/Contents/Frameworks/Sparkle.framework"
          ln -sf ../Frameworks/Sparkle.framework/Versions/B/Autoupdate "bin/Private LLM.app/Contents/MacOS/Autoupdate" 2>/dev/null || true

      - name: Sign binaries and app
        env:
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
        run: |
          IDENTITY="Developer ID Application: Ju-yeong Park ($APPLE_TEAM_ID)"

          # Sign bundled CLI tools
          codesign --force --options runtime \
            --sign "$IDENTITY" --timestamp \
            "bin/Private LLM.app/Contents/Resources/private-llm"

          codesign --force --options runtime \
            --sign "$IDENTITY" --timestamp \
            "bin/Private LLM.app/Contents/Resources/pulumi"

          # Sign Sparkle framework internals (deepest first)
          codesign --force --options runtime \
            --sign "$IDENTITY" --timestamp \
            "bin/Private LLM.app/Contents/Frameworks/Sparkle.framework/Versions/B/XPCServices/Downloader.xpc"

          codesign --force --options runtime \
            --sign "$IDENTITY" --timestamp \
            "bin/Private LLM.app/Contents/Frameworks/Sparkle.framework/Versions/B/XPCServices/Installer.xpc"

          codesign --force --options runtime \
            --sign "$IDENTITY" --timestamp \
            "bin/Private LLM.app/Contents/Frameworks/Sparkle.framework/Versions/B/Updater.app"

          codesign --force --options runtime \
            --sign "$IDENTITY" --timestamp \
            "bin/Private LLM.app/Contents/Frameworks/Sparkle.framework/Versions/B/Autoupdate"

          codesign --force --options runtime \
            --sign "$IDENTITY" --timestamp \
            "bin/Private LLM.app/Contents/Frameworks/Sparkle.framework/Versions/B/Sparkle"

          codesign --force --options runtime \
            --sign "$IDENTITY" --timestamp \
            "bin/Private LLM.app/Contents/Frameworks/Sparkle.framework"

          # Sign main binary and app bundle
          codesign --force --options runtime \
            --sign "$IDENTITY" --timestamp \
            "bin/Private LLM.app/Contents/MacOS/PrivateLLM"

          codesign --force --options runtime \
            --sign "$IDENTITY" --timestamp \
            "bin/Private LLM.app"

          codesign -dvv "bin/Private LLM.app"

      - name: Create DMG
        run: |
          create-dmg \
            --volname "Private LLM" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Private LLM.app" 175 190 \
            --app-drop-link 425 190 \
            --no-internet-enable \
            "bin/Private-LLM.dmg" \
            "bin/Private LLM.app"

      - name: Sign DMG
        env:
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
        run: |
          codesign --force --options runtime \
            --sign "Developer ID Application: Ju-yeong Park ($APPLE_TEAM_ID)" \
            --timestamp "bin/Private-LLM.dmg"

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ vars.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "bin/Private-LLM.dmg" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 20m || {
              # Fetch the notarization log on failure
              SUBMISSION_ID=$(xcrun notarytool history \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_ID_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" 2>/dev/null | head -5 | grep -oE '[0-9a-f-]{36}' | head -1)
              if [ -n "$SUBMISSION_ID" ]; then
                echo "--- Notarization log ---"
                xcrun notarytool log "$SUBMISSION_ID" \
                  --apple-id "$APPLE_ID" \
                  --password "$APPLE_ID_PASSWORD" \
                  --team-id "$APPLE_TEAM_ID" 2>/dev/null || true
              fi
              exit 1
            }

          xcrun stapler staple "bin/Private-LLM.dmg"

      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" bin/Private-LLM.dmg

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" 2>/dev/null || true
